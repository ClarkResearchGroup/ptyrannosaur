# Jupyter Book (classic v1) configuration
# Docs: https://jupyterbook.org/customize/config.html
title: PtyRANNOSAUR
author: Clark and Huang Research Groups
copyright: "2026"
logo: logo.png

# Do not re-execute the notebook on build; render its stored outputs.
execute:
  execute_notebooks: "off"

# Only build files listed in _toc.yml.
only_build_toc_files: true

# Jupyter Book's default MyST extensions (incl. dollarmath for $...$ math),
# plus html_image for the notebook's raw <img> tags. Listing this key replaces
# the defaults, so the defaults must be repeated here.
parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist
    - html_image

# Remove the header button cluster.
html:
  use_issues_button: false
  use_repository_button: false
  use_edit_page_button: false

sphinx:
  config:
    html_theme_options:
      use_download_button: false
      use_fullscreen_button: false
      use_source_button: false
